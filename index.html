<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>최저가 페이지로 이동 중</title>
<meta name="robots" content="noindex, nofollow">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WZN0F0FBKN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-WZN0F0FBKN');
</script>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    text-align: center;
    padding-top: 80px;
    margin: 0;
    background: #fafafa;
    color: #333;
  }
  h2 { font-size: 20px; margin-bottom: 8px; }
  p { color: #666; font-size: 14px; }
  .btn {
    display: inline-block;
    padding: 14px 28px;
    margin-top: 20px;
    font-size: 16px;
    background: #ff5e2d;
    color: white;
    border: none;
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
  }
  .btn:hover { background: #e54a1f; }
  .error {
    color: #c0392b;
    margin-top: 30px;
    font-size: 14px;
  }
  .source {
    color: #999;
    font-size: 12px;
    margin-top: 40px;
  }
</style>
</head>
<body>

<h2>최저가 페이지로 이동 중입니다</h2>
<p>잠시만 기다려주세요...</p>

<a id="manual-btn" class="btn" href="#" style="display:none;">👉 바로 이동하기</a>

<div id="error-msg" class="error" style="display:none;">
  유효하지 않은 링크입니다.
</div>

<p class="source">
  이 페이지는 쿠팡 파트너스 활동의 일환으로,<br>
  이에 따른 일정액의 수수료를 제공받습니다.
</p>

<script>
(function() {
  // URL 파라미터 파싱
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');     // 상품 ID (예: buds-pro4)
  var src = params.get('src');   // 출처 (예: naver, wp, threads)

  if (!id) {
    document.getElementById('error-msg').style.display = 'block';
    return;
  }

  // links.json 불러와서 매칭되는 쿠팡 URL 찾기
  fetch('links.json?t=' + Date.now())  // 캐시 방지
    .then(function(res) {
      if (!res.ok) throw new Error('links.json load failed');
      return res.json();
    })
    .then(function(links) {
      var targetUrl = links[id];

      if (!targetUrl) {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-msg').textContent = '상품을 찾을 수 없습니다: ' + id;
        return;
      }

      // GA4 이벤트 전송 (GA4 설정한 경우에만)
      if (typeof gtag === 'function') {
        gtag('event', 'coupang_click', {
          'product_id': id,
          'source': src || 'unknown'
        });
      }

      // 수동 클릭 버튼 표시
      var btn = document.getElementById('manual-btn');
      btn.href = targetUrl;
      btn.style.display = 'inline-block';

      // 2초 후 자동 이동
      setTimeout(function() {
        window.location.href = targetUrl;
      }, 2000);
    })
    .catch(function(err) {
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = '링크 정보를 불러오지 못했습니다.';
      console.error(err);
    });
})();
</script>

</body>
</html>
